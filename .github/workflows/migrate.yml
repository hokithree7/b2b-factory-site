name: Full Site Migration v17 - Reliable WP Porter

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Split XML Files
        run: |
          cat << 'EOF' > wp_split_gen.py
          import os, re, datetime

          def get_xml_item(title, content, ptype, pid, source_url=None):
              date = datetime.datetime.now().strftime('%a, %d %b %Y %H:%M:%S +0000')
              item = f"""
              <item>
                  <title><![CDATA[{title}]]></title>
                  <link>http://localhost/?p={pid}</link>
                  <pubDate>{date}</pubDate>
                  <dc:creator><![CDATA[admin]]></dc:creator>
                  <guid isPermaLink="false">http://localhost/?p={pid}</guid>
                  <description></description>
                  <content:encoded><![CDATA[{content}]]></content:encoded>
                  <wp:post_id>{pid}</wp:post_id>
                  <wp:post_type><![CDATA[{ptype}]]></wp:post_type>
                  <wp:status><![CDATA[publish]]></wp:status>
              """
              if source_url:
                  item += f"<wp:attachment_url><![CDATA[{source_url}]]></wp:attachment_url>\n"
              item += "</item>"
              return item

          base_site = "https://b2b-factory-site-hlk.pages.dev"
          header = f'<?xml version="1.0" encoding="UTF-8" ?><rss version="2.0" xmlns:excerpt="http://wordpress.org/export/1.2/excerpt/" xmlns:content="http://purl.org/rss/1.0/modules/content/" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:wp="http://wordpress.org/export/1.2/"><channel><title>HLK Migration</title><wp:wxr_version>1.2</wp:wxr_version>'
          footer = "</channel></rss>"

          pages_items = []
          media_items = []
          id_counter = 5000

          # 1. 扫描附件
          for root, dirs, files in os.walk("assets"):
              for file in files:
                  if any(file.endswith(ex) for ext in ['.jpg','.jpeg','.png','.gif','.webp','.mp4']):
                      id_counter += 1
                      rel = os.path.join(root, file).replace("\\", "/")
                      media_items.append(get_xml_item(file, "", "attachment", id_counter, f"{base_site}/{rel}"))

          # 2. 扫描页面内容
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "index.html" and "assets" not in root and root != ".":
                      id_counter += 1
                      path = root.strip("./")
                      with open(os.path.join(root, file), "r", encoding="utf-8") as f:
                          html = f.read()
                      title = re.search(r"<title>(.*?)</title>", html)
                      title = title.group(1).replace(" | HLK Tape", "") if title else path
                      content = re.search(r"<body[^>]*>(.*?)</body>", html, re.DOTALL)
                      content = content.group(1) if content else html
                      ptype = "post" if "newsblog" in path else "page"
                      pages_items.append(get_xml_item(title, content, ptype, id_counter))

          with open("hlk_pages.xml", "w", encoding="utf-8") as f: f.write(header + "\n".join(pages_items) + footer)
          with open("hlk_media.xml", "w", encoding="utf-8") as f: f.write(header + "\n".join(media_items) + footer)
          EOF
          python3 wp_split_gen.py

      - name: Commit and Push
        run: |
          git config --global user.name "Migration Bot"
          git config --global user.email "bot@hlktape.com"
          git add hlk_pages.xml hlk_media.xml
          git commit -m "Generate Split XML for Reliable Import v17" || echo "No changes"
          git push
