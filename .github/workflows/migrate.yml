name: Full Site Migration v15 - PRO WordPress Theme

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate PRO WordPress Theme
        run: |
          cat << 'EOF' > wp_final_gen.py
          import os, re, shutil

          theme_slug = "hlktape-pro-theme"
          theme_path = theme_slug
          os.makedirs(theme_path, exist_ok=True)

          # 1. 搬运资源文件夹
          if os.path.exists("assets"):
              shutil.copytree("assets", os.path.join(theme_path, "assets"), dirs_exist_ok=True)

          # 2. 提取 index.html 的精髓
          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # 提取 <head> 内容并清理所有已有的脚本链接 (稍后在 functions.php 统一加载)
          head_match = re.search(r'<head>(.*?)</head>', html, re.DOTALL)
          raw_head = head_match.group(1) if head_match else ""
          clean_head = re.sub(r'<(link|script)[^>]*(href|src)=["\'](/assets/|http)[^>]*>', '', raw_head)

          # 提取 Header & Footer HTML
          header_part = re.split(r'<(section|main)', html, 1)[0]
          header_nav = header_part.split('<body', 1)[1].split('>', 1)[1] if '<body' in header_part else ""
          
          footer_part = re.split(r'<(footer)', html, 1)
          footer_content = "<footer" + footer_part[2] if len(footer_part) > 1 else ""

          # 3. 写入 style.css (核心元数据)
          with open(os.path.join(theme_path, "style.css"), "w") as f:
              f.write("/*\nTheme Name: HLK Tape Pro Theme\nAuthor: Accio Work\nDescription: Professional B2B Clone for WordPress\nVersion: 3.0\nText Domain: hlktape-pro\n*/")

          # 4. 写入 header.php
          with open(os.path.join(theme_path, "header.php"), "w") as f:
              f.write(f'<!DOCTYPE html><html <?php language_attributes(); ?>><head><meta charset="<?php bloginfo( "charset" ); ?>"><meta name="viewport" content="width=device-width, initial-scale=1">{clean_head}<?php wp_head(); ?></head><body <?php body_class(); ?>>{header_nav}')

          # 5. 写入 footer.php
          with open(os.path.join(theme_path, "footer.php"), "w") as f:
              f.write(f'{footer_content}<?php wp_footer(); ?></body></html>')

          # 6. 写入 functions.php (最关键：资源动态加载)
          functions_php = """<?php
          function hlk_pro_scripts() {
              $uri = get_template_directory_uri();
              // 自动加载本地化的 CSS 和 JS
              wp_enqueue_style( 'hlk-main-style', get_stylesheet_uri() );
              
              // 注册所有 assets 目录下的 css
              $css_dir = get_template_directory() . '/assets/css';
              if(is_dir($css_dir)) {
                  foreach(glob($css_dir . '/*.css') as $file) {
                      $name = basename($file, '.css');
                      wp_enqueue_style('hlk-'.$name, $uri . '/assets/css/' . basename($file));
                  }
              }
              
              // 注册所有 assets 目录下的 js
              $js_dir = get_template_directory() . '/assets/js';
              if(is_dir($js_dir)) {
                  foreach(glob($js_dir . '/*.js') as $file) {
                      $name = basename($file, '.js');
                      wp_enqueue_script('hlk-'.$name, $uri . '/assets/js/' . basename($file), array(), null, true);
                  }
              }
              
              // 引入 Formspree AJAX
              wp_enqueue_script('formspree-ajax', 'https://unpkg.com/@formspree/ajax@1', array(), null, true);
          }
          add_action( 'wp_enqueue_scripts', 'hlk_pro_scripts' );

          function hlk_pro_setup() {
              add_theme_support( 'title-tag' );
              add_theme_support( 'post-thumbnails' );
              register_nav_menus( array( 'primary' => 'Main Menu' ) );
          }
          add_action( 'after_setup_theme', 'hlk_pro_setup' );
          """
          with open(os.path.join(theme_path, "functions.php"), "w") as f:
              f.write(functions_php)

          # 7. 写入通用页面模板 index.php / page.php
          page_php = """<?php get_header(); ?>
          <div class="entry-content">
              <?php if ( have_posts() ) : while ( have_posts() ) : the_post(); the_content(); endwhile; endif; ?>
          </div>
          <?php get_footer(); ?>"""
          with open(os.path.join(theme_path, "page.php"), "w") as f: f.write(page_php)
          with open(os.path.join(theme_path, "index.php"), "w") as f: f.write(page_php)

          print("PRO Theme successfully generated.")
          EOF
          python3 wp_final_gen.py

      - name: Commit and Push
        run: |
          git config --global user.name "Migration Bot"
          git config --global user.email "bot@hlktape.com"
          git add hlktape-pro-theme/
          git commit -m "Generate PRO Visual-Ready Theme v15" || echo "No changes"
          git push
