          for entry in "${urls[@]}"; do
            url=$(echo $entry | cut -d "|" -f 1 | xargs)
            path=$(echo $entry | cut -d "|" -f 2 | xargs)
            echo "Downloading $url to $path..."
            mkdir -p $(dirname "$path")
            curl -L "$url" -o "$path"
            sed -i "s|https://www.hlktape.com/|/|g" "$path"
            # Remove the language selector HTML block
            python3 -c "
import sys, re
path = sys.argv[1]
with open(path, 'r', encoding='utf-8') as f:
    content = f.read()
# Strip the css link and the div block
pattern = r'<link rel=\"stylesheet\" type=\"text/css\" href=\"https://shopcdnpro\.grainajz\.com/inst/Ain/2912/67765/sections/lang_selector2_.*?/index\.css\">.*?<div class=\"lang-selector header-lang notranslate\">.*?</div>'
content = re.sub(pattern, '', content, flags=re.DOTALL)
with open(path, 'w', encoding='utf-8') as f:
    f.write(content)
" "$path"
