name: Full Site Migration v6 - Perfect Clone

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Migrate, Localize and Fix
        run: |
          cat << 'EOF' > migrate.py
          import os, requests, re, json, time, hashlib
          from urllib.parse import urlparse, urljoin

          urls = [
            'https://www.hlktape.com/', 'https://www.hlktape.com/about-us', 'https://www.hlktape.com/custom', 
            'https://www.hlktape.com/products', 'https://www.hlktape.com/nasal-strips', 'https://www.hlktape.com/mouth-tape', 
            'https://www.hlktape.com/newsblog', 'https://www.hlktape.com/contact-us', 'https://www.hlktape.com/privacy',
            'https://www.hlktape.com/application/sleep-mouthtape', 'https://www.hlktape.com/application/tira-nasal', 
            'https://www.hlktape.com/application/tiras-nasales', 'https://www.hlktape.com/application/custom-nasal-strip-supplier', 
            'https://www.hlktape.com/application/mouth-tape-oem', 'https://www.hlktape.com/application/custom-size-mouth-tape', 
            'https://www.hlktape.com/application/nasal-strip-manufacturer', 'https://www.hlktape.com/ar/', 
            'https://www.hlktape.com/nl/', 'https://www.hlktape.com/fr/', 'https://www.hlktape.com/de/', 
            'https://www.hlktape.com/it/', 'https://www.hlktape.com/ru/', 'https://www.hlktape.com/es/', 
            'https://www.hlktape.com/mouth-tape1', 'https://www.hlktape.com/nasal-strips1'
          ]

          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"}
          asset_map = {}

          def download_asset(url, subfolder):
              if not url or url.startswith('data:') or url.startswith('javascript:') or url.startswith('/'): return url
              if url in asset_map: return asset_map[url]
              try:
                  parsed = urlparse(url)
                  ext = os.path.splitext(parsed.path)[1].split('?')[0]
                  if not ext: ext = ".bin"
                  filename = hashlib.md5(url.encode()).hexdigest() + ext
                  local_dir = os.path.join("assets", subfolder)
                  os.makedirs(local_dir, exist_ok=True)
                  local_path = os.path.join(local_dir, filename)
                  
                  print(f"  Asset: {url}")
                  r = requests.get(url, headers=headers, timeout=30)
                  if r.status_code == 200:
                      with open(local_path, 'wb') as f: f.write(r.content)
                      # CRITICAL: Use root-relative path for Cloudflare Pages
                      rel_path = f"/assets/{subfolder}/{filename}"
                      asset_map[url] = rel_path
                      return rel_path
              except: pass
              return url

          for url in urls:
              parsed = urlparse(url)
              path = parsed.path
              target = "index.html" if not path or path == "/" else path.strip("/") + "/index.html"
              os.makedirs(os.path.dirname(target) if os.path.dirname(target) else ".", exist_ok=True)
              
              print(f"Syncing: {url}")
              r = requests.get(url, headers=headers, timeout=30)
              html = r.text
              
              # 1. 彻底封死头部的国旗乱码和语言选择器弹窗
              cleanup_css = '<style>.lang-selector, .header-lang, .lang-box, #CountrySelect, .skiptranslate, .goog-te-banner-frame { display: none !important; opacity: 0 !important; pointer-events: none !important; }</style>'
              html = html.replace('</head>', cleanup_css + '</head>')
              
              # 2. 本地化资源 (强力正则)
              # Images
              for img in re.findall(r'src="([^"]*?\.(?:png|jpg|jpeg|gif|svg|webp)[^"]*?)"', html, re.I):
                  local = download_asset(urljoin(url, img), "images")
                  html = html.replace(f'src="{img}"', f'src="{local}"')
              
              # CSS
              for css in re.findall(r'href="([^"]*?\.css[^"]*?)"', html, re.I):
                  local = download_asset(urljoin(url, css), "css")
                  html = html.replace(f'href="{css}"', f'href="{local}"')

              # JS
              for js in re.findall(r'src="([^"]*?\.js[^"]*?)"', html, re.I):
                  local = download_asset(urljoin(url, js), "js")
                  html = html.replace(f'src="{js}"', f'src="{local}"')

              # 3. 询盘接口 maqlkzwa + 字段名修正
              html = re.sub(r'<form([^>]*)action="[^"]*"', r'<form \1 action="https://formspree.io/f/maqlkzwa" method="POST"', html)
              html = html.replace('action="javaScript:void(0)"', 'action="https://formspree.io/f/maqlkzwa" method="POST"')
              for old, new in [('id="inquiry_email"', 'name="email" id="inquiry_email"'), 
                               ('id="inquiry_name"', 'name="name" id="inquiry_name"'),
                               ('id="inquiry_message"', 'name="message" id="inquiry_message"'),
                               ('id="fileInput"', 'name="attachment" id="fileInput"')]:
                  html = html.replace(old, new)

              # 4. 注入 100% 成功的 AJAX 屏蔽脚本
              fix_js = """
              <script>
              (function() {
                  var clean = function() {
                      document.querySelectorAll("form").forEach(function(f) {
                          if (f.action.indexOf("formspree") === -1) {
                              f.action = "https://formspree.io/f/maqlkzwa";
                              f.method = "POST";
                              f.onsubmit = null; 
                              var n = f.cloneNode(true); f.parentNode.replaceChild(n, f);
                          }
                      });
                  };
                  setTimeout(clean, 500); setTimeout(clean, 2000);
              })();
              </script>
              """
              html = html.replace('</body>', fix_js + '</body>')
              html = html.replace('https://www.hlktape.com/', '/')
              
              with open(target, "w", encoding="utf-8") as f: f.write(html)
          EOF
          python3 migrate.py

      - name: Commit and Push
        run: |
          git config --global user.name "Migration Bot"
          git config --global user.email "bot@hlktape.com"
          git add .
          git commit -m "Full local asset sync + layout fix v6" || echo "No changes"
          git push
