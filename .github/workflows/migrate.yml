name: Full Site Migration v13 - WP Content Porter

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate WP Import File
        run: |
          cat << 'EOF' > wp_content.py
          import os, re, json
          from datetime import datetime

          xml_header = """<?xml version="1.0" encoding="UTF-8" ?>
          <rss version="2.0" xmlns:excerpt="http://wordpress.org/export/1.2/excerpt/" xmlns:content="http://purl.org/rss/1.0/modules/content/" xmlns:wfw="http://wellformedweb.org/CommentAPI/" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:wp="http://wordpress.org/export/1.2/">
          <channel>
          <title>HLK Tape Migration</title>
          <wp:wxr_version>1.2</wp:wxr_version>
          """
          xml_footer = "</channel></rss>"

          posts_xml = []

          # 遍历所有已下载的页面
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file == "index.html" and root != ".":
                      path = root.strip("./")
                      full_path = os.path.join(root, file)
                      
                      with open(full_path, "r", encoding="utf-8") as f:
                          html = f.read()
                      
                      # 提取 Title
                      title_match = re.search(r"<title>(.*?)</title>", html)
                      title = title_match.group(1).replace(" | HLK Tape", "") if title_match else path
                      
                      # 提取主内容 (尝试定位 <main> 或特定的 content div)
                      content_match = re.search(r"<(main|article|div id=\"content\")[^>]*>(.*?)</\1>", html, re.DOTALL)
                      content = content_match.group(2) if content_match else "Content not found"
                      
                      # 区分文章类型
                      post_type = "post" if "newsblog" in path else "page"
                      
                      post_xml = f"""
                      <item>
                          <title>{title}</title>
                          <link>http://localhost/{path}/</link>
                          <pubDate>{datetime.now().strftime('%a, %d %b %Y %H:%M:%S +0000')}</pubDate>
                          <dc:creator>admin</dc:creator>
                          <guid isPermaLink="false">http://localhost/?p={hash(path)}</guid>
                          <description></description>
                          <content:encoded><![CDATA[{content}]]></content:encoded>
                          <wp:post_type>{post_type}</wp:post_type>
                          <wp:status>publish</wp:status>
                      </item>
                      """
                      posts_xml.append(post_xml)

          with open("migration_posts.xml", "w", encoding="utf-8") as f:
              f.write(xml_header + "\n".join(posts_xml) + xml_footer)

          print("Generated migration_posts.xml")
          EOF
          # 假设之前的下载脚本已经把文件搬运到了当前目录
          # (由于这是一个演示逻辑，我们需要在本地环境或CI中确保页面文件存在)
          python3 wp_content.py

      - name: Commit and Push
        run: |
          git config --global user.name "Migration Bot"
          git config --global user.email "bot@hlktape.com"
          git add migration_posts.xml
          git commit -m "Generate WordPress Import XML v13" || echo "No changes"
          git push
